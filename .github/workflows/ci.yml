name: Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run the full suite every weekday at 06:00 UTC as a smoke check
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

jobs:
  # ── API Tests ──────────────────────────────────────────────────────────────
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # API tests only need the request context, not a browser binary
      - name: Run API tests
        run: npx playwright test tests/api --reporter=github,html

      - name: Upload API test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-api-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

  # ── E2E Tests ──────────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npx playwright test tests/e2e --reporter=github,html

      - name: Upload E2E test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-e2e-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

      - name: Upload test traces on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-${{ github.run_id }}
          path: test-results/
          retention-days: 7
